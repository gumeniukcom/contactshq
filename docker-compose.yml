services:
  app:
    image: ghcr.io/gumeniukcom/contactshq:latest
    ports:
      - "8080:8080"
    environment:
      CHQ_DATABASE_DRIVER: postgres
      CHQ_DATABASE_DSN: "postgres://chq:chq@postgres:5432/contactshq?sslmode=disable"
      CHQ_AUTH_JWT_SECRET: "change-me-in-production"
    volumes:
      - backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chq
      POSTGRES_PASSWORD: chq
      POSTGRES_DB: contactshq
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chq"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  backups:
