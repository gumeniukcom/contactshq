
server:
  port: 8080
  host: "0.0.0.0"

database:
  driver: "sqlite"
  dsn: "contactshq.db"

auth:
  jwt_secret: "change-me-in-production"
  token_ttl: "24h"
  refresh_ttl: "720h"

google:
  # Optional global defaults. Users provide their own credentials via the UI.
  client_id: ""
  client_secret: ""
  redirect_url: "http://localhost:8080/api/v1/auth/google/callback"

carddav:
  path_prefix: "/dav"

backup:
  dir: "./backups"
  schedule: "0 2 * * *"

log:
  level: "info"
  format: "json"
